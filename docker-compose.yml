services:

  postgres-db:
    image: postgres
    container_name: postgres-db
    restart: always
    environment:
      POSTGRES_DB: employeedb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Shreya29#
    ports:
      - "5433:5432"

  traineeapi:
    build: .
    container_name: traineeapi-container
    depends_on:
      - postgres-db
    ports:
      - "8081:8085"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-db:5432/employeedb
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: Shreya29#
